<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Whole Life Diagnosis — The Wellbeing Cognoscente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:#F5F2ED;-webkit-font-smoothing:antialiased}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
    .page{animation:fadeUp 0.35s ease both;max-width:620px;margin:0 auto;padding:0 20px 80px}
    .logo-wrap{text-align:center;padding:36px 0 24px}
    .logo{height:76px;object-fit:contain}
    .tagline{font-size:11px;color:#009C84;letter-spacing:3px;text-transform:uppercase;margin-top:10px;font-weight:500}
    .card{background:#FAFAF8;border-radius:18px;padding:28px 32px;margin-bottom:16px;box-shadow:0 2px 24px rgba(0,120,100,0.06);border:1px solid #C5EBE5}
    .card-soft{background:#E8F7F4;border-radius:18px;padding:24px 28px;margin-bottom:16px;border:1px solid #C5EBE5}
    h1{font-size:26px;color:#484848;font-weight:700;line-height:1.3;margin-bottom:12px;font-family:'Cormorant Garamond',serif}
    h2{font-size:22px;color:#484848;font-weight:700;line-height:1.35;margin-bottom:10px;font-family:'Cormorant Garamond',serif}
    p{font-size:14px;color:#6C6C6C;line-height:1.8;margin-bottom:10px}
    .divider{height:1px;background:#C5EBE5;margin:18px 0}
    .btn-primary{display:block;width:100%;padding:15px 24px;border-radius:10px;border:none;background:#009C84;color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.18s,transform 0.18s;text-align:center}
    .btn-primary:hover{background:#007A68;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none}
    .btn-ghost{padding:10px 20px;border-radius:8px;border:1.5px solid #009C84;background:transparent;color:#009C84;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.18s}
    .btn-ghost:hover{background:rgba(0,156,132,0.06)}
    .step-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
    .step-num{width:26px;height:26px;border-radius:50%;background:#009C84;color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
    .step-title{font-size:13.5px;font-weight:600;color:#484848;margin-bottom:2px}
    .step-desc{font-size:12px;color:#9C9C9C;line-height:1.6}
    .domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .domain-card{padding:14px 16px;border-radius:12px;cursor:pointer;border:1.5px solid #E0E0E0;background:#FAFAF8;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.04);transition:all 0.16s}
    .domain-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,156,132,0.13)}
    .domain-card.selected{border-color:var(--col);background:color-mix(in srgb, var(--col) 8%, white)}
    .domain-icon{font-size:18px;margin-bottom:4px}
    .domain-label{font-size:13px;font-weight:600;color:#484848;margin-bottom:2px}
    .domain-desc{font-size:11px;color:#9C9C9C;line-height:1.4}
    .domain-tick{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--col);display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700}
    .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px;margin-bottom:6px}
    .progress-bar{height:4px;background:#C5EBE5;border-radius:2px;overflow:hidden;margin-bottom:6px}
    .progress-fill{height:100%;background:#009C84;border-radius:2px;transition:width 0.35s ease}
    .progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
    .progress-label{font-size:12px;color:#009C84;font-weight:600}
    .progress-pct{font-size:12px;color:#9C9C9C}
    .q-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;margin-bottom:16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
    .q-text{font-size:19px;color:#484848;line-height:1.55;margin-bottom:26px;font-weight:700;font-family:'Cormorant Garamond',serif}
    .scale-wrap{display:flex;gap:8px;margin-bottom:6px}
    .scale-btn{flex:1;padding:14px 4px;border-radius:10px;border:1.5px solid #E0E0E0;background:#FAFAF8;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.14s}
    .scale-btn:hover,.scale-btn.active{border-color:var(--col);background:color-mix(in srgb,var(--col) 12%,white)}
    .scale-num{font-size:17px;font-weight:700;color:#9C9C9C;font-family:'DM Sans',sans-serif}
    .scale-btn.active .scale-num{color:var(--col)}
    .scale-lbl{font-size:9px;color:#9C9C9C;text-align:center;line-height:1.3}
    .scale-ends{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:#9C9C9C}
    .choice-btn{width:100%;padding:13px 18px;border-radius:10px;margin-bottom:8px;border:1.5px solid #E0E0E0;background:#FAFAF8;text-align:left;cursor:pointer;font-size:13px;color:#6C6C6C;font-family:'DM Sans',sans-serif;line-height:1.5;transition:all 0.14s}
    .choice-btn:hover,.choice-btn.active{border-color:#009C84;background:#E8F7F4;color:#484848}
    .loading-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .loading-inner{text-align:center;padding:0 24px}
    .spinner{width:44px;height:44px;border:3px solid #C5EBE5;border-top:3px solid #009C84;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
    .report-label{font-size:10px;letter-spacing:2.5px;color:#009C84;text-transform:uppercase;margin-bottom:8px;font-weight:600}
    .report-headline{font-size:22px;color:#484848;font-weight:700;line-height:1.4;border-left:4px solid #009C84;padding-left:18px;margin-bottom:18px;font-family:'Cormorant Garamond',serif}
    .domain-row{padding:12px 16px;border-radius:10px;margin-bottom:8px}
    .domain-row-name{font-size:11px;font-weight:600;margin-bottom:3px;letter-spacing:0.5px}
    .domain-row-text{font-size:13px;color:#6C6C6C;line-height:1.55}
    .root-cause{font-size:16px;color:#484848;line-height:1.7;font-family:'Cormorant Garamond',serif;font-style:italic}
    .rec-box{padding:16px 20px;border-radius:12px;margin-bottom:4px}
    .rec-title{font-size:13px;font-weight:600;margin-bottom:4px}
    .rec-desc{font-size:13px;color:#6C6C6C;line-height:1.6}
    .cta-box{padding:28px 32px;border-radius:16px;background:#009C84;text-align:center;margin-bottom:16px}
    .cta-h{font-size:20px;font-weight:700;color:white;margin-bottom:8px;font-family:'Cormorant Garamond',serif}
    .cta-p{font-size:13px;color:rgba(255,255,255,0.88);margin-bottom:20px;line-height:1.65}
    .cta-btn{padding:13px 32px;border-radius:8px;background:white;color:#009C84;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.18s}
    .cta-btn:hover{background:#007A68;color:white;transform:translateY(-1px)}
    .secondary-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .small-text{font-size:12px;color:#9C9C9C;line-height:1.6}
    @media(max-width:520px){.domain-grid{grid-template-columns:1fr}.scale-wrap{gap:5px}}
  </style>
</head>

<script>

const DOMAINS = [

  {id:'career',        label:'Career & Purpose',     icon:'◈', desc:'Work, ambition, meaning in what you do professionally',  color:'#4A6A8C'},
  {id:'relationships', label:'Relationships',         icon:'❧', desc:'Partnerships, friendships, family, connection',         color:'#4A8C70'},

  {id:'mental',        label:'Mental & Emotional',    icon:'◎', desc:'Mind, emotions, stress, clarity, inner peace',          color:'#007A68'},
  {id:'financial',     label:'Financial',             icon:'◇', desc:'Money, security, relationship with wealth',             color:'#9C7A2A'},
  {id:'environment',   label:'Environment',           icon:'❁', desc:'Space, surroundings, the people you spend time with',  color:'#4A8C70'},
  {id:'contribution',  label:'Contribution & Legacy', icon:'✦', desc:'Impact, giving back, what you leave behind',           color:'#4A6A8C'},
];

const DQ = {
  identity:[
    {q:'How clearly can you articulate who you are — separate from your job, role, or relationships?',scale:true},
    {q:'How often do you make decisions that feel genuinely aligned with your values?',scale:true},
    {q:'Which best describes where you are right now?',options:['I've outgrown the identity I built — I know it no longer fits','I feel unclear about who I am and what I stand for','I have an identity but it feels performative, not real','External events have disrupted my sense of self']},
  ],
  career:[
    {q:'How much of your work feels purposeful and aligned with who you are?',scale:true},
    {q:'How often does your work energise rather than drain you?',scale:true},
    {q:'Which resonates most?',options:['I'm successful but feel hollow — the career worked, the meaning didn't','I've outgrown this role but don't know what's next','I'm in the wrong field but feel trapped','My business has grown but I'm shrinking inside it']},
  ],
  relationships:[
    {q:'How well do your closest relationships support who you are becoming?',scale:true},
    {q:'How much energy do your key relationships give vs. take?',scale:true},
    {q:'Which feels most true right now?',options:['I've changed but my relationships haven't caught up','I'm surrounded by people but feel deeply alone','I'm staying in relationships that no longer fit to avoid conflict','A key relationship ending has disrupted my whole sense of self']},
  ],
  health:[
    {q:'How well does your physical energy support the life you want to live?',scale:true},
    {q:'How consistent are you with physical practices that matter to you?',scale:true},
    {q:'Which best describes your situation?',options:['I start health habits but can never sustain them','My body feels like a symptom of everything else being wrong','I've neglected my health for so long I don't know where to start','I'm physically active but still feel depleted and exhausted']},
  ],
  mental:[
    {q:'How much mental clarity and inner calm do you experience in a typical week?',scale:true},
    {q:'How effectively do you process difficult emotions without them derailing you?',scale:true},
    {q:'Which resonates most?',options:['I overthink everything — my mind works against me','I feel anxious or low much of the time but can't pinpoint why','I've been through something significant and haven't fully processed it','I numb out rather than face what I'm actually feeling']},
  ],
  financial:[
    {q:'How aligned is your relationship with money to your actual values?',scale:true},
    {q:'How secure and in control do you feel about your financial life?',scale:true},
    {q:'Which feels most true?',options:['I earn well but spend in ways that don't reflect what I care about','Financial anxiety is a constant background noise in my life','I avoid thinking about money because it brings shame or fear','I have wealth but it hasn't brought the peace or meaning I expected']},
  ],
  environment:[

    {q:'How intentional are the people, inputs, and rhythms in your daily environment?',scale:true},
    {q:'Which best describes it?',options:['My environment was designed for a version of me that no longer exists','I'm surrounded by noise, clutter, or people that drain my energy','My calendar controls me — I have no protected space for what matters','The digital world constantly pulls me from my real priorities']},
  ],
  contribution:[
    {q:'How much does your daily life feel connected to something larger than yourself?',scale:true},
    {q:'How clearly can you articulate the legacy or impact you want to leave?',scale:true},
    {q:'Which resonates?',options:['I've been so focused on achieving that I've lost sight of why it matters','I want to give back but don't know how to make it real in my life','Success feels hollow because it isn't connected to purpose','I haven't had space to think about legacy — I'm just surviving']},
  ],
};

const SCALE_LABELS = ['Not at all','Rarely','Sometimes','Often','Completely'];
const PHASE_COLORS = ['#B85042','#4A8C70','#4A6A8C'];
const PHASE_NAMES  = ['Reset Audit','Architecture','Sustainable Rhythms'];
const URGENCY = {
  high:  {label:'High Urgency',    color:'#B85042'},
  medium:{label:'Significant Need',color:'#9C7A2A'},
  low:   {label:'Growth Focus',    color:'#4A8C70'},
};

let state = {
  screen: 'welcome',
  domains: [],
  dIdx: 0,
  qIdx: 0,
  answers: {},
  report: null,
  loading: 'Reading your responses...',
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function routeToPhase(answers, domains) {
  const scores = domains.map(d => {
    const qs = answers[d] || {};
    const vals = Object.entries(qs).filter(([k,v]) => !k.startsWith('c') && typeof v==='number').map(([,v])=>v);
    return {domain:d, score: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 2};
  });
  const avg = scores.reduce((a,b)=>a+b.score,0)/scores.length;
  const lowest = [...scores].sort((a,b)=>a.score-b.score).slice(0,2).map(s=>s.domain);
  if (avg<=2.0) return {phase:1,tier:'premium',urgency:'high',lowestDomains:lowest};
  if (avg<=3.2) return {phase:1,tier:'core',urgency:'medium',lowestDomains:lowest};
  return {phase:2,tier:'core',urgency:'low',lowestDomains:lowest};
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==='className') e.className=v;
    else if (k==='style' && typeof v==='object') Object.assign(e.style,v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c => {
    if (c==null||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  });
  return e;
}

function pill(label, color) {
  return el('span',{className:'pill',style:{background:color+'22',border:'1.5px solid '+color+'44',color}},label);
}

function goTo(screen) {
  setState({screen});
  window.scrollTo(0,0);
}

function toggleDomain(id) {
  const d = state.domains;
  const next = d.includes(id) ? d.filter(x=>x!==id) : d.length<5 ? [...d,id] : d;
  setState({domains:next});
}

function advance(upd) {
  const {dIdx,qIdx,domains} = state;
  const activeQs = DQ[domains[dIdx]]||[];
  if (qIdx<activeQs.length-1) setState({answers:upd,qIdx:qIdx+1});
  else if (dIdx<domains.length-1) setState({answers:upd,dIdx:dIdx+1,qIdx:0});
  else runReport(upd);
}

function answerScale(v) {
  const d = state.domains[state.dIdx];
  const upd = {...state.answers,[d]:{...(state.answers[d]||{}),[state.qIdx]:v}};
  advance(upd);
}

function answerChoice(ch) {
  const d = state.domains[state.dIdx];
  const upd = {...state.answers,[d]:{...(state.answers[d]||{}),'c'+state.qIdx:ch}};
  advance(upd);
}

async function runReport(final) {
  goTo('loading');
  const msgs = ['Reading your responses...','Mapping your integration landscape...','Building your personal profile...','Identifying your recommended path...','Preparing your report...'];
  let mi=0;
  const iv = setInterval(()=>{mi=(mi+1)%msgs.length;setState({loading:msgs[mi]});},1500);
  const routing = routeToPhase(final, state.domains);
  const summary = state.domains.map(d=>{
    const dObj=DOMAINS.find(x=>x.id===d);
    const ans=final[d]||{};
    const lines=DQ[d].map((q,i)=>{
      if(q.scale){const v=ans[i];return'  Q: '+q.q+'\n  A: '+(v!=null?SCALE_LABELS[v-1]:'No answer')+' ('+v+'/5)';}
      return'  Q: '+q.q+'\n  A: '+(ans['c'+i]||'No answer');
    }).join('\n');
    return'DOMAIN: '+dObj.label+'\n'+lines;
  }).join('\n\n');

  const domainStructure = state.domains.map(d=>{
    const label=DOMAINS.find(x=>x.id===d).label;
    return '{"name":"'+label+'","summary":"REQUIRED: 2 specific sentences about what this client revealed in the '+label+' domain based on their actual answers"}';
  }).join(',');

  const prompt = 'You are a warm insightful practitioner at The Wellbeing Cognoscente (TWC).\nTWC model: Phase 1=Reset Audit, Phase 2=Architecture, Phase 3=Sustainable Rhythms.\nClient answers:\n'+summary+'\nRouting: Phase '+routing.phase+', urgency: '+routing.urgency+'.\nReturn ONLY raw JSON starting with { and ending with }:\n{"headline":"powerful 10-15 word sentence","insight":"2-3 sentences referencing actual scores","domains":['+domainStructure+'],"rootCause":"1-2 sentences on underlying theme","recommendation":"2-3 sentences naming Phase '+routing.phase+'","phase":'+routing.phase+',"tier":"'+routing.tier+'","urgency":"'+routing.urgency+'","programmeTitle":"specific TWC programme","programmeDesc":"one sentence for this client","ctaLine":"warm invitation to book discovery call"}';

  try {
    const res = await fetch('/api/diagnose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const data = await res.json();
    const parsed = JSON.parse(data.result.replace(/```json|```/g,'').trim());
    clearInterval(iv);
    setState({report:{...parsed,routing,selectedDomains:state.domains},screen:'report'});
    window.scrollTo(0,0);
  } catch(e) {
    clearInterval(iv);
    setState({
      report:{
        headline:'Your life is asking for a different kind of attention.',
        insight:'Across your chosen domains, a consistent pattern of misalignment is visible — not failure, but growth that has outpaced the structure around you.',
        domains:state.domains.map(d=>{const dObj=DOMAINS.find(x=>x.id===d);return{name:dObj.label,summary:'Your answers in this domain reveal significant misalignment that will be a priority focus in your integration work.'}}),
        rootCause:'Your identity has evolved but the systems around you have not caught up.',
        recommendation:'We recommend beginning with Phase 1: Reset Audit.',
        phase:routing.phase,tier:routing.tier,urgency:routing.urgency,
        programmeTitle:'Reset Audit + 12-Week 1:1 Integration Architecture',
        programmeDesc:'A full whole-life diagnostic followed by a bespoke integration system.',
        ctaLine:'Book a free 30-minute Discovery Call to discuss your results.',
        routing,selectedDomains:state.domains
      },
      screen:'report'
    });
    window.scrollTo(0,0);
  }
}

function renderWelcome() {
  return el('div',{className:'page'},
    el('div',{className:'logo-wrap'},
      el('img',{src:LOGO,alt:'The Wellbeing Cognoscente',className:'logo'}),
      el('div',{className:'tagline'},'Whole Life Integration')
    ),
    el('div',{className:'card'},
      el('h1',{},'Find out exactly where you are — and what you need next.'),
      el('p',{},'This is not a generic wellness quiz. It is a guided diagnostic built on the TWC Whole Life Integration Model — the same framework our practitioners use with every client.'),
      el('div',{className:'divider'}),
      ...[['1','Choose your most urgent life areas','Select 1 to 5 domains that feel most alive or most stuck right now'],
          ['2','Answer 3 targeted questions per area','Specific questions that go beneath the surface symptoms'],
          ['3','Receive your personalised report','A real analysis of what is happening and the exact path forward']
      ].map(([n,t,d])=>el('div',{className:'step-row'},
        el('div',{className:'step-num'},n),
        el('div',{},el('div',{className:'step-title'},t),el('div',{className:'step-desc'},d))
      )),
      el('div',{style:{height:'8px'}}),
      el('button',{className:'btn-primary',onClick:()=>goTo('domains')},'Begin Your Diagnosis'),
      el('p',{style:{textAlign:'center',marginTop:'12px',fontSize:'12px',color:'#9C9C9C'}},'Takes 5 to 7 minutes  ·  Your responses are private')
    )
  );
}

function renderDomains() {
  const selected = state.domains;
  return el('div',{className:'page'},
    el('div',{className:'logo-wrap',style:{paddingTop:'28px'}},
      el('img',{src:LOGO,alt:'The Wellbeing Cognoscente',style:{height:'56px',objectFit:'contain'}})
    ),
    el('div',{className:'card'},
      el('h2',{},'Which areas feel most urgent right now?'),
      el('p',{},
        'Choose ',
        el('strong',{style:{color:'#009C84'}},'1 to 5 domains'),
        ' that feel most alive, most stuck, or most in need of attention.'
      ),
      el('div',{className:'domain-grid'},
        ...DOMAINS.map(d=>{
          const sel=selected.includes(d.id);
          const card=el('div',{
            className:'domain-card'+(sel?' selected':''),
            style:{'--col':d.color},
            onClick:()=>toggleDomain(d.id)
          },
            el('div',{className:'domain-icon',style:{color:d.color}},d.icon),
            el('div',{className:'domain-label'},d.label),
            el('div',{className:'domain-desc'},d.desc)
          );
          if(sel) card.appendChild(el('div',{className:'domain-tick',style:{'--col':d.color}},'✓'));
          return card;
        })
      ),
      selected.length>0 && el('div',{style:{marginBottom:'14px'}},
        el('div',{className:'small-text',style:{marginBottom:'6px'}},selected.length+' domain'+(selected.length!==1?'s':'')+' selected'+(selected.length===5?' (maximum)':'')),
        el('div',{}, ...selected.map(id=>{const d=DOMAINS.find(x=>x.id===id);return pill(d.label,d.color);}) )
      ),
      el('button',{
        className:'btn-primary',
        disabled:selected.length===0,
        onClick:()=>{setState({dIdx:0,qIdx:0});goTo('questions');}
      }, selected.length>0?'Continue — '+selected.length*3+' questions':'Select at least one domain')
    )
  );
}

function renderQuestions() {
  const {domains,dIdx,qIdx,answers} = state;
  const domainId = domains[dIdx];
  const dObj = DOMAINS.find(d=>d.id===domainId);
  const qs = DQ[domainId]||[];
  const q = qs[qIdx];
  const totalQs = domains.reduce((a,d)=>a+(DQ[d]?.length||0),0);
  const doneQs = domains.slice(0,dIdx).reduce((a,d)=>a+(DQ[d]?.length||0),0)+qIdx;
  const pct = totalQs?Math.round((doneQs/totalQs)*100):0;
  const ans = answers[domainId]||{};

  return el('div',{className:'page'},
    el('div',{className:'logo-wrap',style:{paddingTop:'24px'}},
      el('img',{src:LOGO,alt:'The Wellbeing Cognoscente',style:{height:'48px',objectFit:'contain'}})
    ),
    el('div',{},
      el('div',{className:'progress-row'},
        el('span',{className:'progress-label'},dObj.label),
        el('span',{className:'progress-pct'},pct+'% complete')
      ),
      el('div',{className:'progress-bar'},el('div',{className:'progress-fill',style:{width:pct+'%'}}))
    ),
    el('div',{className:'card',style:{marginTop:'16px'}},
      el('div',{className:'q-tag',style:{background:dObj.color+'18',border:'1px solid '+dObj.color+'30',color:dObj.color}},dObj.icon+' '+dObj.label),
      el('div',{className:'q-text'},q.q),
      q.scale
        ? el('div',{},
            el('div',{className:'scale-wrap'},
              ...[1,2,3,4,5].map(v=>{
                const active=ans[qIdx]===v;
                const btn=el('button',{
                  className:'scale-btn'+(active?' active':''),
                  style:{'--col':dObj.color},
                  onClick:()=>answerScale(v)
                },
                  el('div',{className:'scale-num',style:{color:active?dObj.color:'#9C9C9C'}},v),
                  el('div',{className:'scale-lbl'},SCALE_LABELS[v-1])
                );
                return btn;
              })
            ),
            el('div',{className:'scale-ends'},el('span',{},'Struggling'),el('span',{},'Thriving'))
          )
        : el('div',{},
            ...q.options.map(opt=>{
              const active=ans['c'+qIdx]===opt;
              return el('button',{
                className:'choice-btn'+(active?' active':''),
                onClick:()=>answerChoice(opt)
              },opt);
            })
          )
    ),
    el('div',{style:{textAlign:'center',marginTop:'8px'}},
      el('button',{className:'btn-ghost',onClick:()=>goTo('domains')},'Back to domains')
    )
  );
}

function renderLoading() {
  return el('div',{className:'loading-wrap'},
    el('div',{className:'loading-inner'},
      el('img',{src:LOGO,alt:'The Wellbeing Cognoscente',style:{height:'72px',objectFit:'contain',marginBottom:'28px',animation:'pulse 2s ease-in-out infinite'}}),
      el('div',{className:'spinner'}),
      el('h2',{},state.loading),
      el('p',{style:{maxWidth:'320px',margin:'0 auto',textAlign:'center'}},'Our practitioner model is reading your responses and preparing your personalised integration report.')
    )
  );
}

function renderReport() {
  const r = state.report;
  if(!r) return el('div',{});
  const pc = PHASE_COLORS[(r.phase||1)-1];
  const ub = URGENCY[r.urgency]||URGENCY.medium;

  return el('div',{className:'page'},
    el('div',{className:'logo-wrap'},
      el('img',{src:LOGO,alt:'The Wellbeing Cognoscente',className:'logo'}),
      el('div',{className:'tagline'},'Your Integration Report')
    ),
    el('div',{className:'card'},
      el('div',{className:'report-label'},'What we see in you'),
      el('div',{className:'report-headline'},'"'+r.headline+'"'),
      el('p',{},r.insight)
    ),
    el('div',{className:'card'},
      el('div',{className:'report-label'},'Your domain picture'),
      ...(r.selectedDomains||[]).map((id,i)=>{
        const dObj=DOMAINS.find(x=>x.id===id)||DOMAINS[i%DOMAINS.length];
        const cd=r.domains?r.domains[i]:null;
        const summary=cd&&cd.summary&&cd.summary.trim().length>10?cd.summary.trim():'This domain shows significant misalignment and will be a priority focus in your integration work.';
        return el('div',{className:'domain-row',style:{background:dObj.color+'12',borderLeft:'3px solid '+dObj.color}},
          el('div',{className:'domain-row-name',style:{color:dObj.color}},dObj.icon+'  '+dObj.label),
          el('div',{className:'domain-row-text'},summary)
        );
      })
    ),
    el('div',{className:'card-soft'},
      el('div',{className:'report-label'},'The underlying pattern'),
      el('p',{className:'root-cause'},r.rootCause)
    ),
    el('div',{className:'card'},
      el('div',{className:'report-label'},'Your recommended path'),
      el('div',{style:{marginBottom:'14px'}},
        pill('Phase '+r.phase+' — '+PHASE_NAMES[(r.phase||1)-1],pc),
        pill(ub.label,ub.color)
      ),
      el('p',{},r.recommendation),
      el('div',{className:'rec-box',style:{background:pc+'10',border:'1px solid '+pc+'30'}},
        el('div',{className:'rec-title',style:{color:pc}},r.programmeTitle),
        el('div',{className:'rec-desc'},r.programmeDesc)
      )
    ),
    el('div',{className:'cta-box'},
      el('div',{className:'cta-h'},'Your next step'),
      el('p',{className:'cta-p'},r.ctaLine),
      el('button',{className:'cta-btn',onClick:()=>window.open(CALENDLY,'_blank')},'Book Your Free Discovery Call')
    ),
    el('div',{className:'card',style:{textAlign:'center',padding:'20px 28px'}},
      el('p',{className:'small-text',style:{marginBottom:'14px'}},'Not ready to book? Explore more about TWC or retake the diagnosis.'),
      el('div',{className:'secondary-row'},
        el('button',{className:'btn-ghost',onClick:()=>window.open(WEBSITE,'_blank')},'Explore TWC'),
        el('button',{className:'btn-ghost',onClick:()=>{setState({screen:'welcome',domains:[],dIdx:0,qIdx:0,answers:{},report:null});window.scrollTo(0,0);}},'Start Again')
      )
    ),
    el('p',{style:{textAlign:'center',fontSize:'12px',color:'#9C9C9C',marginTop:'4px'}},'2026 The Wellbeing Cognoscente  ·  '+EMAIL)
  );
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML='';
  const s = state.screen;
  let content;
  if(s==='welcome')   content=renderWelcome();
  else if(s==='domains')   content=renderDomains();
  else if(s==='questions') content=renderQuestions();
  else if(s==='loading')   content=renderLoading();
  else if(s==='report')    content=renderReport();
  else content=renderWelcome();
  app.appendChild(content);
}

render();
</script>
</body>
</html>
