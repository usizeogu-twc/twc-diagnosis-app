<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Whole Life Diagnosis - The Wellbeing Cognoscente</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"DM Sans",sans-serif;background:#F5F2ED;min-height:100vh;-webkit-font-smoothing:antialiased}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
    .page{animation:fadeUp 0.3s ease both;max-width:600px;margin:0 auto;padding:0 20px 80px}
    .logo-wrap{text-align:center;padding:32px 0 20px}
    .logo{height:72px;object-fit:contain}
    .tagline{font-size:11px;color:#009C84;letter-spacing:3px;text-transform:uppercase;margin-top:8px;font-weight:500}
    .card{background:#FAFAF8;border-radius:16px;padding:26px 30px;margin-bottom:14px;box-shadow:0 2px 20px rgba(0,120,100,0.06);border:1px solid #C5EBE5}
    .card-soft{background:#E8F7F4;border-radius:16px;padding:22px 26px;margin-bottom:14px;border:1px solid #C5EBE5}
    h1{font-size:24px;color:#484848;font-weight:700;line-height:1.3;margin-bottom:10px;font-family:"Cormorant Garamond",serif}
    h2{font-size:20px;color:#484848;font-weight:700;line-height:1.35;margin-bottom:10px;font-family:"Cormorant Garamond",serif}
    p{font-size:14px;color:#6C6C6C;line-height:1.8;margin-bottom:8px}
    .divider{height:1px;background:#C5EBE5;margin:16px 0}
    .btn-primary{display:block;width:100%;padding:14px 20px;border-radius:10px;border:none;background:#009C84;color:white;font-size:14px;font-weight:600;cursor:pointer;text-align:center;font-family:"DM Sans",sans-serif;margin-top:8px}
    .btn-primary:hover{background:#007A68}
    .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
    .btn-ghost{padding:10px 20px;border-radius:8px;border:1.5px solid #009C84;background:transparent;color:#009C84;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;display:inline-block;margin:8px auto 0}
    .step-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
    .step-num{width:24px;height:24px;border-radius:50%;background:#009C84;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
    .step-title{font-size:13px;font-weight:600;color:#484848;margin-bottom:1px}
    .step-desc{font-size:11px;color:#9C9C9C;line-height:1.5}
    .domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .domain-card{padding:13px 14px;border-radius:12px;cursor:pointer;border:1.5px solid #E0E0E0;background:#FAFAF8;position:relative;transition:all 0.15s;user-select:none}
    .domain-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,156,132,0.1)}
    .domain-icon{font-size:16px;margin-bottom:3px}
    .domain-label{font-size:12px;font-weight:600;color:#484848;margin-bottom:2px}
    .domain-desc{font-size:10px;color:#9C9C9C;line-height:1.35}
    .domain-tick{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:700}
    .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600;margin:2px 4px 2px 0}
    .progress-wrap{margin-bottom:20px}
    .progress-row{display:flex;justify-content:space-between;margin-bottom:5px}
    .progress-bar{height:4px;background:#C5EBE5;border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:#009C84;border-radius:2px;transition:width 0.35s ease}
    .q-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;margin-bottom:14px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
    .q-text{font-size:18px;color:#484848;line-height:1.55;margin-bottom:22px;font-weight:700;font-family:"Cormorant Garamond",serif}
    .scale-wrap{display:flex;gap:6px;margin-bottom:5px}
    .scale-btn{flex:1;padding:12px 4px;border-radius:10px;border:1.5px solid #E0E0E0;background:#FAFAF8;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:"DM Sans",sans-serif;transition:all 0.12s}
    .scale-btn:hover{border-color:#009C84;background:#E8F7F4}
    .scale-btn.active{border-color:#009C84;background:#E8F7F4}
    .scale-num{font-size:16px;font-weight:700;color:#9C9C9C}
    .scale-btn.active .scale-num{color:#009C84}
    .scale-lbl{font-size:8px;color:#9C9C9C;text-align:center;line-height:1.2}
    .scale-ends{display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:#9C9C9C}
    .choice-btn{width:100%;padding:12px 16px;border-radius:10px;margin-bottom:7px;border:1.5px solid #E0E0E0;background:#FAFAF8;text-align:left;cursor:pointer;font-size:13px;color:#6C6C6C;font-family:"DM Sans",sans-serif;line-height:1.45;transition:all 0.12s}
    .choice-btn:hover,.choice-btn.active{border-color:#009C84;background:#E8F7F4;color:#484848}
    .loading-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .loading-inner{text-align:center;padding:0 20px}
    .spinner{width:40px;height:40px;border:3px solid #C5EBE5;border-top:3px solid #009C84;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
    .report-label{font-size:10px;letter-spacing:2px;color:#009C84;text-transform:uppercase;margin-bottom:7px;font-weight:600}
    .report-headline{font-size:20px;color:#484848;font-weight:700;line-height:1.4;border-left:4px solid #009C84;padding-left:16px;margin-bottom:14px;font-family:"Cormorant Garamond",serif}
    .domain-row{padding:11px 14px;border-radius:9px;margin-bottom:7px}
    .domain-row-name{font-size:11px;font-weight:600;margin-bottom:2px;letter-spacing:0.4px}
    .domain-row-text{font-size:12px;color:#6C6C6C;line-height:1.5}
    .root-cause{font-size:15px;color:#484848;line-height:1.7;font-family:"Cormorant Garamond",serif;font-style:italic}
    .rec-box{padding:14px 18px;border-radius:10px;margin-bottom:4px}
    .rec-title{font-size:13px;font-weight:600;margin-bottom:3px}
    .rec-desc{font-size:12px;color:#6C6C6C;line-height:1.55}
    .cta-box{padding:24px 28px;border-radius:14px;background:#009C84;text-align:center;margin-bottom:14px}
    .cta-h{font-size:18px;font-weight:700;color:white;margin-bottom:7px;font-family:"Cormorant Garamond",serif}
    .cta-p{font-size:13px;color:rgba(255,255,255,0.88);margin-bottom:16px;line-height:1.6}
    .cta-btn{padding:12px 28px;border-radius:8px;background:white;color:#009C84;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:"DM Sans",sans-serif;transition:all 0.18s}
    .cta-btn:hover{background:#007A68;color:white}
    .secondary-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
    .small-text{font-size:12px;color:#9C9C9C;line-height:1.5}
    @media(max-width:480px){.domain-grid{grid-template-columns:1fr}.scale-wrap{gap:4px}}
  </style>
</head>
<body>
<img id="twc-logo" src="https://www.usi101.com/wp-content/uploads/go-x/u/d6b4e7da-8a3b-4f02-91ff-9e9e555f55fa/l83,t16,w639,h639/image.png" alt="The Wellbeing Cognoscente" style="display:none" onerror="this.src=''" />
<div id="app"></div>
<script>
var LOGO     = "https://www.usi101.com/wp-content/uploads/go-x/u/d6b4e7da-8a3b-4f02-91ff-9e9e555f55fa/l83,t16,w639,h639/image.png";
var CALENDLY = "https://calendly.com/thewellbeingcognoscente";
var WEBSITE  = "https://www.usi101.com/spaces-by-twc/";
var EMAIL    = "support@thewellbeingc.com";
var DOMAINS = [
  {id:"identity",      label:"Identity & Self",      icon:"❋", desc:"Who you are, your sense of self, purpose and direction",  color:"#009C84"},
  {id:"career",        label:"Career & Purpose",     icon:"◈", desc:"Work, ambition, meaning in what you do professionally",  color:"#4A6A8C"},
  {id:"relationships", label:"Relationships",         icon:"❧", desc:"Partnerships, friendships, family, connection",         color:"#4A8C70"},
  {id:"health",        label:"Physical Health",       icon:"◉", desc:"Body, energy, movement, sleep, nutrition",              color:"#B85042"},
  {id:"mental",        label:"Mental & Emotional",    icon:"◎", desc:"Mind, emotions, stress, clarity, inner peace",          color:"#007A68"},
  {id:"financial",     label:"Financial",             icon:"◇", desc:"Money, security, relationship with wealth",             color:"#9C7A2A"},
  {id:"environment",   label:"Environment",           icon:"❁", desc:"Space, surroundings, the people you spend time with",  color:"#4A8C70"},
  {id:"contribution",  label:"Contribution & Legacy", icon:"✦", desc:"Impact, giving back, what you leave behind",           color:"#4A6A8C"}
];
var SCALE_LABELS = ["Not at all","Rarely","Sometimes","Often","Completely"];
var PHASE_COLORS = ["#B85042","#4A8C70","#4A6A8C"];
var PHASE_NAMES  = ["Reset Audit","Architecture","Sustainable Rhythms"];
var URGENCY = {
  high:   {label:"High Urgency",     color:"#B85042"},
  medium: {label:"Significant Need", color:"#9C7A2A"},
  low:    {label:"Growth Focus",     color:"#4A8C70"}
};
var DQ = {
  identity:[
    {q:"How clearly can you articulate who you are, separate from your job, role, or relationships?",scale:true},
    {q:"How often do you make decisions that feel genuinely aligned with your values?",scale:true},
    {q:"Which best describes where you are right now?",options:[
      "I have outgrown the identity I built and I know it no longer fits",
      "I feel unclear about who I am and what I stand for",
      "I have an identity but it feels performative, not real",
      "External events have disrupted my sense of self"
    ]}
  ],
  career:[
    {q:"How much of your work feels purposeful and aligned with who you are?",scale:true},
    {q:"How often does your work energise rather than drain you?",scale:true},
    {q:"Which resonates most?",options:[
      "I am successful but feel hollow. The career worked, the meaning did not",
      "I have outgrown this role but do not know what is next",
      "I am in the wrong field but feel trapped",
      "My business has grown but I am shrinking inside it"
    ]}
  ],
  relationships:[
    {q:"How well do your closest relationships support who you are becoming?",scale:true},
    {q:"How much energy do your key relationships give vs. take?",scale:true},
    {q:"Which feels most true right now?",options:[
      "I have changed but my relationships have not caught up",
      "I am surrounded by people but feel deeply alone",
      "I am staying in relationships that no longer fit to avoid conflict",
      "A key relationship ending has disrupted my whole sense of self"
    ]}
  ],
  health:[
    {q:"How well does your physical energy support the life you want to live?",scale:true},
    {q:"How consistent are you with physical practices that matter to you?",scale:true},
    {q:"Which best describes your situation?",options:[
      "I start health habits but can never sustain them",
      "My body feels like a symptom of everything else being wrong",
      "I have neglected my health for so long I do not know where to start",
      "I am physically active but still feel depleted and exhausted"
    ]}
  ],
  mental:[
    {q:"How much mental clarity and inner calm do you experience in a typical week?",scale:true},
    {q:"How effectively do you process difficult emotions without them derailing you?",scale:true},
    {q:"Which resonates most?",options:[
      "I overthink everything and my mind works against me",
      "I feel anxious or low much of the time but cannot pinpoint why",
      "I have been through something significant and have not fully processed it",
      "I numb out rather than face what I am actually feeling"
    ]}
  ],
  financial:[
    {q:"How aligned is your relationship with money to your actual values?",scale:true},
    {q:"How secure and in control do you feel about your financial life?",scale:true},
    {q:"Which feels most true?",options:[
      "I earn well but spend in ways that do not reflect what I care about",
      "Financial anxiety is a constant background noise in my life",
      "I avoid thinking about money because it brings shame or fear",
      "I have wealth but it has not brought the peace or meaning I expected"
    ]}
  ],
  environment:[
    {q:"How well does your physical space support focus, calm, and who you want to be?",scale:true},
    {q:"How intentional are the people, inputs, and rhythms in your daily environment?",scale:true},
    {q:"Which best describes it?",options:[
      "My environment was designed for a version of me that no longer exists",
      "I am surrounded by noise, clutter, or people that drain my energy",
      "My calendar controls me and I have no protected space for what matters",
      "The digital world constantly pulls me from my real priorities"
    ]}
  ],
  contribution:[
    {q:"How much does your daily life feel connected to something larger than yourself?",scale:true},
    {q:"How clearly can you articulate the legacy or impact you want to leave?",scale:true},
    {q:"Which resonates?",options:[
      "I have been so focused on achieving that I have lost sight of why it matters",
      "I want to give back but do not know how to make it real in my life",
      "Success feels hollow because it is not connected to purpose",
      "I have not had space to think about legacy. I am just surviving"
    ]}
  ]
};
var state = {
  screen: "welcome",
  domains: [],
  dIdx: 0,
  qIdx: 0,
  answers: {},
  report: null,
  loading: "Reading your responses..."
};
function setState(updates) {
  Object.assign(state, updates);
  render();
}
function routeToPhase(answers, domains) {
  var scores = domains.map(function(d) {
    var qs = answers[d] || {};
    var vals = [];
    Object.keys(qs).forEach(function(k) {
      if (k.charAt(0) !== "c" && typeof qs[k] === "number") vals.push(qs[k]);
    });
    return {domain: d, score: vals.length ? vals.reduce(function(a,b){return a+b;},0)/vals.length : 2};
  });
  var avg = scores.reduce(function(a,b){return a+b.score;},0)/scores.length;
  var lowest = scores.slice().sort(function(a,b){return a.score-b.score;}).slice(0,2).map(function(s){return s.domain;});
  if (avg<=2.0) return {phase:1,tier:"premium",urgency:"high",lowestDomains:lowest};
  if (avg<=3.2) return {phase:1,tier:"core",urgency:"medium",lowestDomains:lowest};
  return {phase:2,tier:"core",urgency:"low",lowestDomains:lowest};
}
function el(tag, attrs) {
  var e = document.createElement(tag);
  var children = Array.prototype.slice.call(arguments, 2);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === "className") { e.className = v; }
      else if (k === "style" && typeof v === "object") { Object.assign(e.style, v); }
      else if (k.indexOf("on") === 0) { e.addEventListener(k.slice(2).toLowerCase(), v); }
      else { e.setAttribute(k, v); }
    });
  }
  function addChild(c) {
    if (c == null || c === false) return;
    if (Array.isArray(c)) { c.forEach(addChild); }
    else if (typeof c === "string" || typeof c === "number") { e.appendChild(document.createTextNode(c)); }
    else if (c && c.nodeType) { e.appendChild(c); }
  }
  children.forEach(addChild);
  return e;
}
function pill(label, color) {
  return el("span", {className:"pill", style:{background:color+"22",border:"1.5px solid "+color+"44",color:color}}, label);
}
function goTo(screen) {
  setState({screen: screen});
  window.scrollTo(0, 0);
}
function toggleDomain(id) {
  var d = state.domains;
  var next = d.indexOf(id) >= 0 ? d.filter(function(x){return x!==id;}) : d.length < 5 ? d.concat([id]) : d;
  setState({domains: next});
}
function advance(upd) {
  var dIdx = state.dIdx, qIdx = state.qIdx, domains = state.domains;
  var activeQs = DQ[domains[dIdx]] || [];
  if (qIdx < activeQs.length-1) { setState({answers:upd, qIdx:qIdx+1}); }
  else if (dIdx < domains.length-1) { setState({answers:upd, dIdx:dIdx+1, qIdx:0}); }
  else { runReport(upd); }
}
function answerScale(v) {
  var d = state.domains[state.dIdx];
  var upd = Object.assign({}, state.answers);
  upd[d] = Object.assign({}, upd[d] || {});
  upd[d][state.qIdx] = v;
  advance(upd);
}
function answerChoice(ch) {
  var d = state.domains[state.dIdx];
  var upd = Object.assign({}, state.answers);
  upd[d] = Object.assign({}, upd[d] || {});
  upd[d]["c"+state.qIdx] = ch;
  advance(upd);
}
function runReport(final) {
  goTo("loading");
  var msgs = ["Reading your responses...","Mapping your integration landscape...","Building your personal profile...","Identifying your recommended path...","Preparing your report..."];
  var mi = 0;
  var iv = setInterval(function(){mi=(mi+1)%msgs.length; setState({loading:msgs[mi]});}, 1500);
  var routing = routeToPhase(final, state.domains);
  var summary = state.domains.map(function(d) {
    var dObj = DOMAINS.find(function(x){return x.id===d;});
    var ans = final[d] || {};
    var lines = DQ[d].map(function(q,i) {
      if (q.scale) { var v=ans[i]; return "  Q: "+q.q+"\n  A: "+(v!=null?SCALE_LABELS[v-1]:"No answer")+" ("+v+"/5)"; }
      return "  Q: "+q.q+"\n  A: "+(ans["c"+i]||"No answer");
    }).join("\n");
    return "DOMAIN: "+dObj.label+"\n"+lines;
  }).join("\n\n");
  var domainLabels = state.domains.map(function(d){
    return DOMAINS.find(function(x){return x.id===d;}).label;
  });
  var prompt = "You are a warm insightful practitioner at The Wellbeing Cognoscente (TWC).\nTWC model: Phase 1=Reset Audit, Phase 2=Architecture, Phase 3=Sustainable Rhythms.\nClient answers:\n"+summary+"\nRouting: Phase "+routing.phase+", urgency: "+routing.urgency+".\nReturn ONLY raw JSON starting with { and ending with }. The JSON must have these exact keys: headline, insight, domains, rootCause, recommendation, phase, tier, urgency, programmeTitle, programmeDesc, ctaLine.\nFor headline: a powerful 10-15 word sentence.\nFor insight: 2-3 sentences referencing actual scores.\nFor domains: an array with one object per selected domain, each with name and summary (2 specific sentences). Domain labels: "+domainLabels.join(", ")+".\nFor rootCause: 1-2 sentences on underlying theme.\nFor recommendation: 2-3 sentences naming Phase "+routing.phase+".\nFor phase: the number "+routing.phase+".\nFor tier: "+routing.tier+".\nFor urgency: "+routing.urgency+".\nFor programmeTitle: a specific TWC programme name.\nFor programmeDesc: one sentence for this client.\nFor ctaLine: a warm invitation to book a discovery call.";
  fetch("/api/diagnose", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({prompt: prompt})
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    clearInterval(iv);
    var text = data.result || "";
    var clean = text.replace(/```json|```/g,"").trim();
    var parsed = JSON.parse(clean);
    parsed.routing = routing;
    parsed.selectedDomains = state.domains.slice();
    setState({report: parsed, screen: "report"});
    window.scrollTo(0,0);
  }).catch(function() {
    clearInterval(iv);
    setState({
      report: {
        headline: "Your life is asking for a different kind of attention.",
        insight: "Across your chosen domains, a consistent pattern of misalignment is visible. Not failure, but growth that has outpaced the structure around you.",
        domains: state.domains.map(function(d) {
          var dObj = DOMAINS.find(function(x){return x.id===d;});
          return {name:dObj.label, summary:"Your answers in this domain reveal significant misalignment that will be a priority focus in your integration work."};
        }),
        rootCause: "Your identity has evolved but the systems around you have not caught up. That gap is where the friction lives.",
        recommendation: "We recommend beginning with Phase 1: Reset Audit — a full diagnostic that maps exactly where the misalignment is.",
        phase: routing.phase, tier: routing.tier, urgency: routing.urgency,
        programmeTitle: "Reset Audit + 12-Week Integration Architecture",
        programmeDesc: "A full whole-life diagnostic followed by a bespoke integration system designed around who you actually are.",
        ctaLine: "Book a free 30-minute Discovery Call. We would love to talk through what you have shared.",
        routing: routing,
        selectedDomains: state.domains.slice()
      },
      screen: "report"
    });
    window.scrollTo(0,0);
  });
}
function renderWelcome() {
  return el("div", {className:"page"},
    el("div", {className:"logo-wrap"},
      el("img", {src:LOGO, alt:"The Wellbeing Cognoscente", className:"logo"}),
      el("div", {className:"tagline"}, "Whole Life Integration")
    ),
    el("div", {className:"card"},
      el("h1", {}, "Find out exactly where you are and what you need next."),
      el("p", {}, "This is not a generic wellness quiz. It is a guided diagnostic built on the TWC Whole Life Integration Model, the same framework our practitioners use with every client."),
      el("div", {className:"divider"}),
      el("div", {className:"step-row"},
        el("div", {className:"step-num"}, "1"),
        el("div", {},
          el("div", {className:"step-title"}, "Choose your most urgent life areas"),
          el("div", {className:"step-desc"}, "Select 1 to 5 domains that feel most alive or most stuck right now")
        )
      ),
      el("div", {className:"step-row"},
        el("div", {className:"step-num"}, "2"),
        el("div", {},
          el("div", {className:"step-title"}, "Answer 3 targeted questions per area"),
          el("div", {className:"step-desc"}, "Specific questions that go beneath the surface symptoms")
        )
      ),
      el("div", {className:"step-row"},
        el("div", {className:"step-num"}, "3"),
        el("div", {},
          el("div", {className:"step-title"}, "Receive your personalised report"),
          el("div", {className:"step-desc"}, "A real analysis of what is happening and the exact path forward")
        )
      ),
      el("div", {style:{height:"8px"}}),
      el("button", {className:"btn-primary", onClick:function(){goTo("domains");}}, "Begin Your Diagnosis"),
      el("p", {style:{textAlign:"center",marginTop:"12px",fontSize:"12px",color:"#9C9C9C"}}, "Takes 5 to 7 minutes. Your responses are private.")
    )
  );
}
function renderDomains() {
  var selected = state.domains;
  var grid = el("div", {className:"domain-grid"});
  DOMAINS.forEach(function(d) {
    var sel = selected.indexOf(d.id) >= 0;
    var card = el("div", {className:"domain-card", onClick:function(){toggleDomain(d.id);}},
      el("div", {className:"domain-icon", style:{color:d.color}}, d.icon),
      el("div", {className:"domain-label"}, d.label),
      el("div", {className:"domain-desc"}, d.desc)
    );
    if (sel) {
      card.style.borderColor = d.color;
      card.style.background = "#E8F7F4";
      card.appendChild(el("div", {className:"domain-tick", style:{background:d.color}}, "✓"));
    }
    grid.appendChild(card);
  });
  var pillsDiv = el("div", {});
  selected.forEach(function(id) {
    var d = DOMAINS.find(function(x){return x.id===id;});
    pillsDiv.appendChild(pill(d.label, d.color));
  });
  var btn = el("button", {
    className: "btn-primary",
    onClick: function(){setState({dIdx:0,qIdx:0}); goTo("questions");}
  }, selected.length > 0 ? "Continue — "+(selected.length*3)+" questions" : "Select at least one domain");
  if (selected.length === 0) btn.setAttribute("disabled","true");
  return el("div", {className:"page"},
    el("div", {className:"logo-wrap", style:{paddingTop:"24px"}},
      el("img", {src:LOGO, alt:"The Wellbeing Cognoscente", style:{height:"56px",objectFit:"contain"}})
    ),
    el("div", {className:"card"},
      el("h2", {}, "Which areas feel most urgent right now?"),
      el("p", {}, "Choose 1 to 5 domains that feel most alive, most stuck, or most in need of attention."),
      grid,
      selected.length > 0 ? el("div", {style:{marginBottom:"14px"}},
        el("div", {className:"small-text", style:{marginBottom:"6px"}}, selected.length+" domain"+(selected.length!==1?"s":"")+" selected"+(selected.length===5?" (maximum)":"")),
        pillsDiv
      ) : null,
      btn
    )
  );
}
function renderQuestions() {
  var domainId = state.domains[state.dIdx];
  var dObj = DOMAINS.find(function(d){return d.id===domainId;});
  var qs = DQ[domainId] || [];
  var q = qs[state.qIdx];
  var ans = state.answers[domainId] || {};
  var totalQs = state.domains.reduce(function(a,d){return a+(DQ[d]?DQ[d].length:0);},0);
  var doneQs = state.domains.slice(0,state.dIdx).reduce(function(a,d){return a+(DQ[d]?DQ[d].length:0);},0)+state.qIdx;
  var pct = totalQs ? Math.round((doneQs/totalQs)*100) : 0;
  var qContent;
  if (q.scale) {
    var sw = el("div", {className:"scale-wrap"});
    [1,2,3,4,5].forEach(function(v) {
      var capturedQIdx = state.qIdx;
      var active = ans[capturedQIdx] === v;
      var btn = el("button", {
        className: "scale-btn"+(active?" active":""),
        type:"button",
        onClick: function(e){e.preventDefault(); e.stopPropagation(); answerScale(v);}
      },
        el("div", {className:"scale-num", style:{color:active?dObj.color:"#9C9C9C"}}, String(v)),
        el("div", {className:"scale-lbl"}, SCALE_LABELS[v-1])
      );
      sw.appendChild(btn);
    });
    qContent = el("div", {},
      sw,
      el("div", {className:"scale-ends"},
        el("span",{},"Struggling"),
        el("span",{},"Thriving")
      )
    );
  } else {
    var cd = el("div",{});
    q.options.forEach(function(opt) {
      var active = ans["c"+state.qIdx] === opt;
      cd.appendChild(el("button", {
        className: "choice-btn"+(active?" active":""),
        type:"button",
        onClick: function(e){e.preventDefault(); e.stopPropagation(); answerChoice(opt);}
      }, opt));
    });
    qContent = cd;
  }
  return el("div", {className:"page"},
    el("div", {className:"logo-wrap", style:{paddingTop:"20px"}},
      el("img", {src:LOGO, alt:"The Wellbeing Cognoscente", style:{height:"44px",objectFit:"contain"}})
    ),
    el("div", {className:"progress-wrap"},
      el("div", {className:"progress-row"},
        el("span",{style:{fontSize:"12px",fontWeight:"600",color:dObj.color}}, dObj.label),
        el("span",{style:{fontSize:"12px",color:"#9C9C9C"}}, pct+"% complete")
      ),
      el("div", {className:"progress-bar"},
        el("div", {className:"progress-fill", style:{width:pct+"%"}})
      )
    ),
    el("div", {className:"card"},
      el("div", {className:"q-tag", style:{background:dObj.color+"18",border:"1px solid "+dObj.color+"30",color:dObj.color}}, dObj.icon+" "+dObj.label),
      el("div", {className:"q-text"}, q.q),
      qContent
    ),
    el("div", {style:{textAlign:"center"}},
      el("button", {className:"btn-ghost", onClick:function(){goTo("domains");}}, "Back to domains")
    )
  );
}
function renderLoading() {
  return el("div", {className:"loading-wrap"},
    el("div", {className:"loading-inner"},
      el("img", {src:LOGO, alt:"The Wellbeing Cognoscente", style:{height:"64px",objectFit:"contain",marginBottom:"24px",animation:"pulse 2s ease-in-out infinite"}}),
      el("div", {className:"spinner"}),
      el("h2", {}, state.loading),
      el("p", {style:{maxWidth:"320px",margin:"0 auto",textAlign:"center"}}, "Our practitioner model is reading your responses and preparing your personalised integration report.")
    )
  );
}
function renderReport() {
  var r = state.report;
  if (!r) return el("div",{});
  var pc = PHASE_COLORS[(r.phase||1)-1];
  var ub = URGENCY[r.urgency] || URGENCY.medium;
  var domainsDiv = el("div",{});
  (r.selectedDomains||[]).forEach(function(id,i) {
    var dObj = DOMAINS.find(function(x){return x.id===id;}) || DOMAINS[i%DOMAINS.length];
    var cd = r.domains ? r.domains[i] : null;
    var summary = cd && cd.summary && cd.summary.trim().length > 10 ? cd.summary.trim() : "This domain shows significant misalignment and will be a priority focus in your integration work.";
    domainsDiv.appendChild(
      el("div", {className:"domain-row", style:{background:dObj.color+"12",borderLeft:"3px solid "+dObj.color}},
        el("div", {className:"domain-row-name", style:{color:dObj.color}}, dObj.icon+"  "+dObj.label),
        el("div", {className:"domain-row-text"}, summary)
      )
    );
  });
  return el("div", {className:"page"},
    el("div", {className:"logo-wrap"},
      el("img", {src:LOGO, alt:"The Wellbeing Cognoscente", className:"logo"}),
      el("div", {className:"tagline"}, "Your Integration Report")
    ),
    el("div", {className:"card"},
      el("div", {className:"report-label"}, "What we see in you"),
      el("div", {className:"report-headline"}, '"'+r.headline+'"'),
      el("p",{}, r.insight)
    ),
    el("div", {className:"card"},
      el("div", {className:"report-label"}, "Your domain picture"),
      domainsDiv
    ),
    el("div", {className:"card-soft"},
      el("div", {className:"report-label"}, "The underlying pattern"),
      el("p", {className:"root-cause"}, r.rootCause)
    ),
    el("div", {className:"card"},
      el("div", {className:"report-label"}, "Your recommended path"),
      el("div", {style:{marginBottom:"12px"}},
        pill("Phase "+r.phase+" — "+PHASE_NAMES[(r.phase||1)-1], pc),
        pill(ub.label, ub.color)
      ),
      el("p",{}, r.recommendation),
      el("div", {className:"rec-box", style:{background:pc+"10",border:"1px solid "+pc+"30"}},
        el("div", {className:"rec-title", style:{color:pc}}, r.programmeTitle),
        el("div", {className:"rec-desc"}, r.programmeDesc)
      )
    ),
    el("div", {className:"cta-box"},
      el("div", {className:"cta-h"}, "Your next step"),
      el("p", {className:"cta-p"}, r.ctaLine),
      el("button", {className:"cta-btn", onClick:function(){window.open(CALENDLY,"_blank");}}, "Book Your Free Discovery Call")
    ),
    el("div", {className:"card", style:{textAlign:"center",padding:"18px 24px"}},
      el("p", {className:"small-text"}, "Not ready to book? Explore TWC or retake the diagnosis."),
      el("div", {className:"secondary-row"},
        el("button", {className:"btn-ghost", onClick:function(){window.open(WEBSITE,"_blank");}}, "Explore TWC"),
        el("button", {className:"btn-ghost", onClick:function(){
          setState({screen:"welcome",domains:[],dIdx:0,qIdx:0,answers:{},report:null});
          window.scrollTo(0,0);
        }}, "Start Again")
      )
    ),
    el("p", {style:{textAlign:"center",fontSize:"12px",color:"#9C9C9C",marginTop:"4px"}}, "2026 The Wellbeing Cognoscente  ·  "+EMAIL)
  );
}
function render() {
  var app = document.getElementById("app");
  while (app.firstChild) app.removeChild(app.firstChild);
  var s = state.screen;
  var content;
  if      (s==="welcome")   content = renderWelcome();
  else if (s==="domains")   content = renderDomains();
  else if (s==="questions") content = renderQuestions();
  else if (s==="loading")   content = renderLoading();
  else if (s==="report")    content = renderReport();
  else                      content = renderWelcome();
  app.appendChild(content);
}
render();
</script>
</body>
</html>
